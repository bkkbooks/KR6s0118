body:
  text: 日本國上都延曆寺僧圓珍求法目録伍紙合胎藏金剛兩部經法等一佰一拾伍卷兩部曼荼羅并道具等經法大毗盧遮那成佛經一部七卷三藏善無畏譯金剛頂瑜伽中略出念誦經一部四卷三藏金剛智譯已上二部載開元録穢跡金剛法禁百變一卷穢跡金剛說神通法一卷竝阿質達散譯千手千眼觀自在大悲心陀羅尼本一卷金剛頂經毗盧遮那三摩地法一卷不動尊使者陀羅尼祕密法一卷竝金剛智譯金剛頂經瑜伽文殊師利菩薩法一品一卷大樂金剛不空真實三摩耶經一卷金剛頂瑜伽念珠經一卷竝不空譯一切如來金剛壽命陀羅尼經一卷金剛不空共譯一字奇特佛頂經三卷金剛恐怖集會方廣儀軌一卷阿利多囉阿嚕力經一卷文殊師利讚法身禮一卷哩吉祥天女十二契一百八名大乘經一卷一切如來全身舍利寶筐印陀羅尼經一卷底哩三昧耶經一卷十一面觀自在菩薩儀軌經三卷吉祥天女十二名號經一卷金剛頂瑜伽十八會指歸一卷金剛頂分別聖位法門一卷菩提場所說頂輪王經五卷金剛壽命陀羅尼經一卷大孔雀明王經三卷無量壽如來供養儀軌一卷大雲輪請雨經二卷施焰口餓鬼陀羅尼經一卷菩提莊嚴陀羅尼經一卷竝不空譯蘇磨呼童子請問經二卷或三卷善無畏譯八大菩薩曼荼羅經一卷葉衣觀自在菩薩經一卷毗沙門天王經一卷金剛頂蓮華部心念誦法二卷金剛頂瑜伽千手千眼念誦法一卷阿閦如來念誦法一卷一字頂輪王念誦儀軌一卷一字頂輪王瑜伽經一卷佛頂尊勝陀羅尼念誦儀軌一卷金剛頂勝初瑜伽念誦法一卷金剛壽命念誦法一卷金剛王菩薩祕密念誦經一卷普賢金剛薩埵念誦儀軌一卷金剛頂瑜伽念誦儀軌一卷或加大樂金剛薩埵仁王般若念誦法一卷如意輪念誦法一卷大虛空藏念誦法一卷聖觀自在菩薩心真言軌儀一卷瑜伽蓮華部念誦法一卷金剛頂經多羅菩薩念誦法一卷甘露軍荼利瑜伽念誦法一卷受菩提心戒儀一卷金剛頂瑜伽三十七尊禮一卷都部陀羅尼目一卷大曼荼羅十七尊義述一卷七俱胝佛母陀羅尼經一卷成就妙法蓮華經王儀軌一卷金剛頂勝初念誦儀軌一卷或加瑜伽經中略出大樂金剛薩埵大藥叉愛子成就法或加女歡喜亦名訶利帝母法大樂金剛不空真實三昧耶經義釋一卷普遍光明大隨求陀羅尼經二卷五字陀羅尼頌一卷聖閻鬘德迦忿怒王念誦法一卷大威怒烏芻澀摩成就儀軌一卷聖迦抳忿怒金剛童子菩薩成就儀軌三卷一髻尊陀羅尼經一卷金剛頂經一字頂輪王念誦儀軌一卷速疾立驗說迦婁羅阿尾奢法一卷大毗盧遮那成佛經略示七支念誦隨行法一卷大日經略攝念誦隨行法亦名五支要行法金剛頂降三世大儀軌一卷或加法王教中觀自在心真言金剛頂經瑜伽文殊師利菩薩儀軌一卷金剛頂經觀自在王如來修行法一卷文殊師利宿曜經二卷竝不空譯金剛頂三貌三菩提心論一卷三藏不空集修習般若波羅蜜觀行儀軌一卷仁王般若陀羅尼釋一卷觀自在大悲成就念誦法一卷金剛手光明灌頂經一卷亦名最勝立印聖無動尊念誦儀軌大孔雀明王畫壇儀軌一卷金輪王佛頂要略念誦法一卷大聖天歡喜雙身毗那夜迦法一卷竝不空譯觀自在菩薩如意輪瑜伽念誦法一卷金剛智譯金剛頂瑜伽普賢修行念誦儀軌一卷亦名他化自在天理趣不空譯貞元捨拾録一卷已上茲載貞元拾遺目録中曼荼羅道具等大毗盧遮那佛胎藏大曼荼羅一鋪五副新造大毗盧遮那佛金剛界九會曼荼羅一卷六副大毗盧遮那佛九頂輪王曼荼羅一鋪六副已上兩事傳教阿闍梨付屬大毗盧遮那佛八十一尊種子曼茶羅一張羯磨杵四口鎮壇橛四枚求法目録一卷以前經法佛像等茲於大唐國長安城左街新昌坊青龍寺傳教和上邊請本抄寫勘定已畢仍略目録如件巨唐大中九年十一月十五日求法僧圓珍録上件曼荼羅及法門等和尚專與句當親臨檢挍一一如法更無不同而恐後學或致疑慮伏乙傳教大阿闍梨幸垂示名永為憑據日本國傳教弟子共奉僧圓珍疏大中九年七月十五日入大悲胎藏五瓶灌頂得般若波羅蜜菩薩便授學胎藏大教畢又至十月三日入金剛界五部灌頂得金剛波羅蜜菩薩便授學金剛界蘇悉地并諸尊瑜伽近一百餘本畢又至十一月五日入傳五部大教大阿闍梨位灌頂道場得曼荼羅菩薩右件大德圓珍已授學總持最上乘教悉并精通所問所答義辨難窮勘可傳持廣利有緣此為相別淨土願見千萬珍重千萬珍重大中九年十月二十一日青龍傳教沙門前長生殿持念大德法全狀付圓珍千萬千萬
